- name: Configure user
  hosts: user
  become: yes
  tasks:
    - name: Enable Nodejs:20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Install Nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: Add user
      ansible.builtin.user:
        name: roboshop
        system: true
        shell: /sbin/nologin
        home: /app
        comment: "Adding roboshop user as a system user"

    - name: Delete app directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create project folder
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Delete Zip file if it alredy exists
      ansible.builtin.file:
        path: /tmp/user.zip
        state: absent

    - name: Download project
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
        dest: /tmp/user.zip

    - name: Unzip project folder
      ansible.builtin.unarchive:
        src: /tmp/user.zip
        dest: /app
        remote_src: yes

    - name: Install package.
      community.general.npm:
        path: /app

    - name: Copy user.service file
      ansible.builtin.template:
        src: user.service
        dest: /etc/systemd/system/user.service
    
    - name: Deamon Reload
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: start user
      ansible.builtin.service:
        state: restarted
        name: user
        enabled: yes