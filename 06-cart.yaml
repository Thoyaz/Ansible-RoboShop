- name: Configure cart
  hosts: cart
  become: yes
  tasks:
    - name: Enable Nodejs:20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Install Nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: Add cart
      ansible.builtin.cart:
        name: roboshop
        system: true
        shell: /sbin/nologin
        home: /app
        comment: "Adding roboshop cart as a system cart"

    - name: Delete app directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create project folder
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Delete Zip file if it alredy exists
      ansible.builtin.file:
        path: /tmp/cart.zip
        state: absent

    - name: Download project
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
        dest: /tmp/cart.zip

    - name: Unzip project folder
      ansible.builtin.unarchive:
        src: /tmp/cart.zip
        dest: /app
        remote_src: yes

    - name: Install package.
      community.general.npm:
        path: /app

    - name: Copy cart.service file
      ansible.builtin.template:
        src: cart.service
        dest: /etc/systemd/system/cart.service
    
    - name: Deamon Reload
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: start cart
      ansible.builtin.service:
        state: restarted
        name: cart
        enable: yes